[env:heltec_wifi_lora_32_V3]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -D REGION_AU915 
    -D ACTIVE_REGION=LORAMAC_REGION_AU915
    -D LoRaWAN_DEBUG_LEVEL=3
    -D RADIO_NSS=8
    -D SLOW_CLK_TPYE=0
    -D LORA_DISPLAY
    -D HELTEC_WIFI_LORA_32_V3
    -D CORE_DEBUG_LEVEL=0
    -D CONFIG_ESP_IPC_TASK_STACK_SIZE=2048
    -D CONFIG_FREERTOS_IDLE_TASK_STACKSIZE=2048
build_unflags = -std=gnu++11
lib_ldf_mode = chain+
monitor_filters = send_on_enter
lib_compat_mode = strict
extra_scripts = pre:utils/env_loader.py
lib_deps =
    jgromes/RadioLib
    adafruit/Adafruit NeoMatrix
    adafruit/RTClib
    olikraus/U8g2
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.4.1
